<!DOCTYPE html>
<html>
<head>

<title>Order Status</title>

<style>

body{
font-family:Arial;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2563eb,#60a5fa);
}

.card{
background:white;
padding:40px;
border-radius:15px;
text-align:center;
width:400px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.icon{
font-size:70px;
color:#22c55e;
margin-bottom:10px;
}

h2{
margin:10px 0;
}

p{
color:#555;
}

.btn{
display:inline-block;
margin-top:20px;
background:#2563eb;
color:white;
padding:10px 20px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
}

.btn:hover{
background:#1e40af;
}

</style>

</head>

<body>

<div class="card">

<div class="icon">✔</div>

<h2>Order Placed Successfully</h2>

<p>Your order has been confirmed and will be processed soon.</p>

<a class="btn" href="/store">Continue Shopping</a>

</div>

</body>
</html>
