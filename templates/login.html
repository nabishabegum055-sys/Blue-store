<!DOCTYPE html>
<html>

<head>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#2563eb,#60a5fa);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username"><br>
<input type="password" name="password" placeholder="Password"><br>

<button>Login</button>

</form>

<p>User: user / user123</p>
<p>Admin: admin / admin123</p>

</div>

</body>
</html>
